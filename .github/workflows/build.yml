name: Build

on:
  workflow_call:
    inputs:
      artifact-retention-days:
        required: false
        type: number
        default: 7
      build-android:
        required: false
        type: boolean
        default: true
      build-windows:
        required: false
        type: boolean
        default: true
      build-linux:
        required: false
        type: boolean
        default: false
      build-macos:
        required: false
        type: boolean
        default: false
      package-windows-setup:
        required: false
        type: boolean
        default: false

env:
  FLUTTER_VERSION: "3.38.5"
  BUILD_TARGET: "lib/main.dart"

jobs:
  android:
    name: Android
    if: ${{ inputs.build-android }}
    runs-on: ubuntu-latest
    env:
      PUB_CACHE: ${{ github.workspace }}/.pub-cache
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --target=${{ env.BUILD_TARGET }}

      - name: Build AAB
        run: flutter build appbundle --release --target=${{ env.BUILD_TARGET }}

      - name: Collect Android artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          find build build_out -type f \( -name "*.apk" -o -name "*.aab" \) -print 2>/dev/null || true
          cp build/app/outputs/flutter-apk/*.apk out/ 2>/dev/null || true
          cp build/app/outputs/bundle/release/*.aab out/ 2>/dev/null || true
          cp build_out/app/outputs/flutter-apk/*.apk out/ 2>/dev/null || true
          cp build_out/app/outputs/bundle/release/*.aab out/ 2>/dev/null || true
          ls -la out

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: out/*
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

  windows:
    name: Windows
    if: ${{ inputs.build-windows }}
    runs-on: windows-latest
    env:
      PUB_CACHE: ${{ github.workspace }}\\.pub-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable symlink support
        shell: pwsh
        run: |
          reg add "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\AppModelUnlock" /t REG_DWORD /f /v "AllowDevelopmentWithoutDevLicense" /d 1
          git config --global core.symlinks true

      - name: Install Inno Setup
        if: ${{ inputs.package-windows-setup }}
        run: choco install innosetup -y --no-progress

      - name: Install Fastforge
        if: ${{ inputs.package-windows-setup }}
        shell: pwsh
        run: |
          dart pub global activate fastforge
          "$env:LOCALAPPDATA\Pub\Cache\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release --target=${{ env.BUILD_TARGET }}

      - name: Build Windows setup package
        if: ${{ inputs.package-windows-setup }}
        shell: pwsh
        run: |
          fastforge package --platform windows --targets exe --skip-clean --build-target=${{ env.BUILD_TARGET }}

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path out -Force | Out-Null
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "out\SlothVPN-windows-portable-x64.zip" -Force
          if ('${{ inputs.package-windows-setup }}' -eq 'true') {
            $setup = Get-ChildItem -Path dist -Recurse -File | Where-Object { $_.Name -like "SlothVPN-*-windows-setup.exe" } | Select-Object -First 1
            if (-not $setup) {
              throw "Windows setup package not found."
            }
            Copy-Item $setup.FullName -Destination (Join-Path "out" $setup.Name) -Force
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: out/*
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

  linux:
    name: Linux
    if: ${{ inputs.build-linux }}
    runs-on: ubuntu-22.04
    env:
      PUB_CACHE: ${{ github.workspace }}/.pub-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Linux dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libstdc++-12-dev \
            liblzma-dev \
            libayatana-appindicator3-dev \
            libcurl4-openssl-dev \
            libglib2.0-dev \
            curl \
            git \
            unzip \
            xz-utils \
            zip \
            libglu1-mesa

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release bundle
        run: flutter build linux --release --target=${{ env.BUILD_TARGET }}

      - name: Collect Linux artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          cp -R build/linux/x64/release/bundle out/SlothVPN-linux-x64
          tar -czf out/SlothVPN-linux-x64.tar.gz -C out SlothVPN-linux-x64
          rm -rf out/SlothVPN-linux-x64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: out/*
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

  macos:
    name: macOS
    if: ${{ inputs.build-macos }}
    runs-on: macos-latest
    env:
      PUB_CACHE: ${{ github.workspace }}/.pub-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release --target=${{ env.BUILD_TARGET }}

      - name: Collect macOS artifacts
        run: |
          mkdir -p out
          ditto -c -k --keepParent "build/macos/Build/Products/Release/SlothVPN.app" "out/SlothVPN-macos.zip"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: out/*
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error
