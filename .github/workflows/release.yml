name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to publish, for example v1.0.1"
        required: true
        type: string
      build_android:
        description: "Include Android artifacts"
        required: false
        default: true
        type: boolean
      build_windows:
        description: "Include Windows artifacts"
        required: false
        default: true
        type: boolean
      build_linux:
        description: "Include Linux artifacts"
        required: false
        default: true
        type: boolean
      build_macos:
        description: "Include macOS artifacts"
        required: false
        default: true
        type: boolean
      package_windows_setup:
        description: "Include Windows setup package"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || inputs.tag_name }}
  cancel-in-progress: false

jobs:
  build_tag:
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/build.yml
    with:
      artifact-retention-days: 30
      build-android: true
      build-windows: true
      build-linux: true
      build-macos: true
      package-windows-setup: true

  build_manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/build.yml
    with:
      artifact-retention-days: 30
      build-android: ${{ inputs.build_android }}
      build-windows: ${{ inputs.build_windows }}
      build-linux: ${{ inputs.build_linux }}
      build-macos: ${{ inputs.build_macos }}
      package-windows-setup: ${{ inputs.package_windows_setup }}

  publish_tag:
    name: Publish GitHub Release
    if: ${{ github.event_name == 'push' }}
    needs: build_tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-assets/**

  publish_manual:
    name: Publish GitHub Release
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: build_manual
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-assets/**
