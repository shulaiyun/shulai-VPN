name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to publish, for example v1.0.1"
        required: true
        type: string
      build_linux:
        description: "Include Linux artifacts"
        required: false
        default: false
        type: boolean
      build_macos:
        description: "Include macOS artifacts"
        required: false
        default: false
        type: boolean
      package_windows_setup:
        description: "Include Windows setup package"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || inputs.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      artifact-retention-days: 30
      build-android: true
      build-windows: true
      build-linux: ${{ github.event_name == 'workflow_dispatch' && inputs.build_linux || false }}
      build-macos: ${{ github.event_name == 'workflow_dispatch' && inputs.build_macos || false }}
      package-windows-setup: ${{ github.event_name == 'workflow_dispatch' && inputs.package_windows_setup || false }}

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-assets/**
